<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arcana TTS – Instant Play (Free)</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 800px; margin: auto; }
    textarea { width: 100%; height: 120px; }
    button { padding: 12px 20px; font-size: 16px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Rime Arcana TTS – Play Instantly (Free 10k chars/mo)</h1>
  <textarea id="text" placeholder="Type or paste your AI-generated text here...">Hello there! This is super realistic text-to-speech. <laugh> Can you believe it?</textarea><br>
  <input type="text" id="speaker" value="sirius" placeholder="Voice name (luna, orion, celeste, etc.)">
  <button onclick="playArcana()">Generate & Play Instantly</button>

  <script>
    async function playArcana() {
      const text = document.getElementById('text').value;
      const speaker = document.getElementById('speaker').value || 'luna';

      // ←←← Put your free Rime API key here (or use a local proxy later)
      const API_KEY = "z3MerM28aV3lzLcqKhHXyZAI6AHr6UmYGq2GNAk2pzc";   // ← get free at app.rime.ai

      const response = await fetch("https://users.rime.ai/v1/rime-tts", {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${API_KEY}`,
          "Content-Type": "application/json",
          "Accept": "audio/mp3"
        },
        body: JSON.stringify({ text, speaker, modelId: "arcana" })
      });

      if (!response.ok) {
        alert("Error (maybe quota finished): " + response.status);
        return;
      }

      const audioBlob = await response.blob();           // MP3 straight from API
      const audioUrl = URL.createObjectURL(audioBlob);   // in-memory URL
      const audio = new Audio(audioUrl);
      audio.play();
    }
  </script>
</body>
</html>
